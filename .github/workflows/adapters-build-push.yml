name: adapters-build-push

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "implementations/**"
      - ".github/workflows/adapters-build-push.yml"

jobs:
  build-push-python-adapters:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        adapter:
          - langchain
          - langgraph
          - llamaindex
          - openai_agents
          - anthropic
          - autogen
          - crewai
          - haystack
          - semantic_kernel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kazi-agents-${{ matrix.adapter }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: implementations/${{ matrix.adapter }}
          file: implementations/${{ matrix.adapter }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-vercel-ai-adapter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/vercel_ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
